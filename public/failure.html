<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raven | Pago Rechazado</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .receipt-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            padding: 2rem;
        }
        .receipt-box {
            border: 1px solid rgba(255,51,51,0.3);
            padding: 3rem;
            max-width: 500px;
            background: rgba(10,10,10,0.8);
        }
        .receipt-box h1 {
            margin-bottom: 1.5rem;
            letter-spacing: 0.1em;
            color: #ff3333;
            font-size: 2rem;
        }
        .btn-primary {
            display: inline-block;
            padding: 1rem 2rem;
            background: #fff;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: all 0.3s;
        }
        .btn-primary:hover {
            background: #ccc;
        }
    </style>
</head>
<body>
    <div class="receipt-container">
        <div class="receipt-box">
            <h1>PAGO RECHAZADO</h1>
            <p style="margin-bottom: 3rem; color: #aaa;" id="fail-reason">Tu transacción no pudo ser procesada. Por favor, verifica tus fondos e intenta nuevamente.</p>
            
            <a href="/" class="btn-primary">INTENTAR DE NUEVO</a>
        </div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const reason = params.get('reason');
        const failText = document.getElementById('fail-reason');
        
        if (reason === 'aborted') {
            failText.innerText = 'Cancelaste el pago en el portal bancario.';
        } else if (reason === 'rejected') {
            failText.innerText = 'El banco rechazó la transacción (posible falta de fondos o tarjeta bloqueada).';
        } else if (reason === 'error') {
            failText.innerText = 'Ocurrió un error técnico al procesar el pago con Transbank.';
        }
    </script>
</body>
</html>
